<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TROLLER DISPLAY (Audience)</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div id="app" class="game-container">
      <canvas id="bg-canvas"></canvas>
      
      <!-- 放送演出レイヤー -->
      <div id="telop-stack" class="telop-stack"></div>
      
      <!-- 実況ナレーターパネル (Narrator.js対応) -->
      <div id="narrator-panel" class="narrator-panel hidden">
        <div class="narrator-box">
          <div class="narrator-face">🎤</div>
          <div class="narrator-text-container">
            <div class="narrator-text-clip"></div>
            <div class="narrator-text"></div>
          </div>
        </div>
      </div>

      <div id="panelist-container" class="panelist-container"></div>
      
      <!-- メインゲーム画面 -->
      <div class="hud">
        <div id="question-text" class="question-box">READY?</div>
        
        <div class="timer-bar">
          <div id="timer-fill" class="timer-fill"></div>
        </div>

        <div class="choices-container">
          <div id="choice-left" class="choice choice-left">
            <span id="text-left">LEFT</span>
          </div>
          <div id="choice-right" class="choice choice-right">
            <span id="text-right">RIGHT</span>
          </div>
        </div>
      </div>

      <!-- トロッコ本体 -->
      <div id="trolley" class="trolley"></div>

      <!-- 判定オーバーレイ -->
      <div id="judge-text-overlay" class="judge-text-overlay">正解</div>
      
      <div id="particles-container" class="particles-container"></div>

      <!-- オーバーレイ (タイトル/リザルト等) -->
      <div id="overlay-layer" class="overlay-layer hidden">
        <div id="overlay-content" class="overlay-content">
          <h2 id="overlay-title">TITLE</h2>
          <p id="overlay-desc">Description</p>
          <button id="start-btn" class="start-btn">START GAME</button>
        </div>
      </div>

      <!-- システムHUD (現在何問目かなど) -->
      <div class="system-hud">
        <div class="q-counter">STAGE: <span id="q-index">0 / 10</span></div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
