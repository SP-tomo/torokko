<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>トロッコアドベンチャー</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Shippori+Mincho:wght@800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app" class="game-container">
      <!-- 背景レイヤー -->
      <div id="bg-layer" class="bg-layer">
        <canvas id="bg-canvas"></canvas>
        <div class="speed-lines"></div>
      </div>

      <!-- スタジオ照明 -->
      <div id="studio-lights" class="studio-lights"></div>
      <div id="spotlight-sweep" class="spotlight-sweep"></div>

      <!-- ジャッジ演出用オーバーレイ -->
      <div id="judge-text-overlay" class="judge-text-overlay">正解</div>
      <div id="particles-container" class="particles-container"></div>

      <!-- テロップスタック -->
      <div id="telop-stack" class="telop-stack"></div>

      <!-- ナレーター (構造はNarrator.jsに合わせる) -->
      <div id="narrator-panel" class="narrator-panel hidden">
        <div class="narrator-face">
          <div class="narrator-eyes"></div>
          <div class="narrator-mouth"></div>
        </div>
        <div class="narrator-bubble">
          <div class="narrator-text-wrap">
            <span class="narrator-text">　</span>
            <span class="narrator-text-clip" aria-hidden="true">　</span>
          </div>
        </div>
      </div>

      <!-- CM明けワイプカード -->
      <div id="stage-card" class="stage-card hidden">
        <div class="stage-card-inner">
          <div class="stage-card-num" id="stage-card-num">STAGE 1</div>
          <div class="stage-card-name" id="stage-card-name">洞窟ゾーン</div>
        </div>
      </div>

      <!-- クイズHUDレイヤー -->
      <div id="hud-layer" class="hud-layer">
        <div id="question-box" class="question-box">
          <h1 id="question-text">読み込み中...</h1>
        </div>

        <div class="choices-container">
          <div id="choice-left" class="choice-panel left">
            <div class="choice-content">
              <span class="choice-label">LEFT</span>
              <span id="text-left" class="choice-text">---</span>
            </div>
          </div>
          <div id="choice-right" class="choice-panel right">
            <div class="choice-content">
              <span class="choice-label">RIGHT</span>
              <span id="text-right" class="choice-text">---</span>
            </div>
          </div>
        </div>

        <div id="timer-bar" class="timer-bar">
          <div id="timer-fill" class="timer-fill"></div>
        </div>
      </div>

      <!-- トロッコレイヤー -->
      <div id="trolley-layer" class="trolley-layer">
        <div id="trolley" class="trolley"></div>
      </div>

      <!-- 一時停止オーバーレイ -->
      <div id="pause-overlay" class="pause-overlay hidden">
        <div class="pause-content">
          <div class="pause-title">⏸ 一時停止</div>
          <button id="resume-btn" class="resume-btn">再開する</button>
        </div>
      </div>

      <!-- メッセージ/リザルトレイヤー -->
      <div id="overlay-layer" class="overlay-layer hidden">
        <div id="overlay-content" class="overlay-content">
          <h2 id="overlay-title">TITLE</h2>
          <p id="overlay-desc">Description</p>
          <button id="start-btn" class="start-btn">START GAME</button>
        </div>
      </div>

      <!-- システムHUD -->
      <div class="system-hud">
        <div class="q-counter">Q:<span id="q-index">0</span>/10</div>
        <button id="pause-btn" class="pause-btn" title="P キーで一時停止">⏸</button>
        <button class="editor-link" id="editor-open-btn">⚙ EDITOR</button>
      </div>

      <!-- エディターオーバーレイ -->
      <div id="editor-overlay" class="editor-overlay hidden">
        <button id="editor-close-btn" class="editor-close-btn">✕ 閉じる</button>
        <iframe id="editor-iframe" src="" class="editor-iframe" title="エディター"></iframe>
      </div>

      <!-- チームバッジ（左上） -->
      <div id="team-badge" class="team-badge">チームA</div>

      <!-- ポイント表示（チームバッジの下） -->
      <div id="point-display" class="point-display">0 pt</div>

      <!-- スコアボード (右下) -->
      <div id="score-board" class="score-board"></div>

      <!-- Dボタンロゴ & 進行バー (最下部) -->
      <div class="bottom-overlay">
        <div class="d-button-box">
          <div class="d-button-circle">dボタン</div>
          <div class="d-button-text">
            <span>テレビで対戦に参加！</span>
            <span>豪華チャンス！</span>
          </div>
        </div>
        <div id="question-progress" class="question-progress">
          <!-- 1 2 3 4 5 etc generated via script -->
        </div>
        <div class="broadcast-sp-logo">超リアルSP</div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
    <script>
      const editorOverlay = document.getElementById('editor-overlay');
      const editorIframe  = document.getElementById('editor-iframe');

      document.getElementById('editor-open-btn').addEventListener('click', () => {
        if (!editorIframe.src || editorIframe.src === window.location.href) {
          editorIframe.src = './editor.html';
        }
        editorOverlay.classList.remove('hidden');
      });

      document.getElementById('editor-close-btn').addEventListener('click', () => {
        editorOverlay.classList.add('hidden');
      });

      window.addEventListener('message', (e) => {
        if (e.data === 'editor-close') {
          editorOverlay.classList.add('hidden');
        }
      });
    </script>
  </body>
</html>
