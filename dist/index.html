<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>トロッコアドベンチャー ENGINE</title>
    <script type="module" crossorigin src="/assets/index-DslBtWnS.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-NbOh2933.css">
  </head>
  <body>
    <div id="app" class="game-container">
      <!-- 背景レイヤー -->
      <div id="bg-layer" class="bg-layer">
        <canvas id="bg-canvas"></canvas>
        <div class="speed-lines"></div>
      </div>

      <!-- スタジオ照明 -->
      <div id="studio-lights" class="studio-lights"></div>
      <div id="spotlight-sweep" class="spotlight-sweep"></div>

      <!-- ジャッジ演出用オーバーレイ -->
      <div id="judge-text-overlay">正解</div>
      <div id="particles-container"></div>

      <!-- テロップスタック -->
      <div id="telop-stack" class="telop-stack"></div>

      <!-- ナレーター -->
      <div id="narrator-panel" class="narrator-panel hidden">
        <div class="narrator-face">
          <div class="narrator-eyes"></div>
          <div class="narrator-mouth"></div>
        </div>
        <div class="narrator-bubble">
          <div class="narrator-text-wrap">
            <span class="narrator-text"></span>
            <span class="narrator-text-clip" aria-hidden="true"></span>
          </div>
        </div>
      </div>

      <!-- CM明けワイプカード -->
      <div id="stage-card" class="stage-card hidden">
        <div class="stage-card-inner">
          <div class="stage-card-num" id="stage-card-num">STAGE 2</div>
          <div class="stage-card-name" id="stage-card-name">ジャングルゾーン</div>
        </div>
      </div>

      <!-- クイズHUDレイヤー -->
      <div id="hud-layer" class="hud-layer">
        <div id="question-box" class="question-box">
          <h1 id="question-text">読み込み中...</h1>
        </div>

        <div class="choices-container">
          <div id="choice-left" class="choice-panel left">
            <div class="choice-content">
              <span class="choice-label">LEFT</span>
              <span id="text-left" class="choice-text">---</span>
            </div>
          </div>
          <div id="choice-right" class="choice-panel right">
            <div class="choice-content">
              <span class="choice-label">RIGHT</span>
              <span id="text-right" class="choice-text">---</span>
            </div>
          </div>
        </div>

        <div id="timer-bar" class="timer-bar">
          <div id="timer-fill" class="timer-fill"></div>
        </div>
      </div>

      <!-- トロッコレイヤー -->
      <div id="trolley-layer" class="trolley-layer">
        <div id="trolley" class="trolley"></div>
      </div>

      <!-- メッセージ/リザルトレイヤー -->
      <div id="overlay-layer" class="overlay-layer hidden">
        <div id="overlay-content" class="overlay-content">
          <h2 id="overlay-title">TITLE</h2>
          <p id="overlay-desc">Description</p>
          <button id="start-btn" class="start-btn">START GAME</button>
        </div>
      </div>

      <!-- システムHUD -->
      <div class="system-hud">
        <div class="q-counter">Q:<span id="q-index">0</span>/10</div>
        <a href="/editor.html" class="editor-link">⚙ EDITOR</a>
      </div>

      <!-- チームバッジ（左上） -->
      <div id="team-badge" class="team-badge">チームA</div>

      <!-- ポイント表示（チームバッジの下） -->
      <div id="point-display" class="point-display">0 pt</div>

      <!-- スコアボード（右側） -->
      <div id="score-board" class="score-board"></div>
    </div>
  </body>
</html>
