<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>トロッコ コントローラー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #header {
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #aaa;
      flex-shrink: 0;
      letter-spacing: 0.1em;
    }

    #buttons {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 8px 12px 16px;
    }

    .btn {
      border: none;
      border-radius: 20px;
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: filter 0.1s, transform 0.08s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2em;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.93);
      filter: brightness(1.3);
    }

    .btn.flash {
      filter: brightness(1.6);
    }

    #btn-left {
      background: linear-gradient(160deg, #1a6fff, #0040cc);
      color: #fff;
      box-shadow: 0 6px 24px rgba(0, 80, 255, 0.45);
    }

    #btn-right {
      background: linear-gradient(160deg, #ff3b3b, #cc0000);
      color: #fff;
      box-shadow: 0 6px 24px rgba(255, 40, 40, 0.45);
    }

    .btn-arrow {
      font-size: 1.4em;
      line-height: 1;
    }

    .btn-label {
      font-size: 0.45em;
      letter-spacing: 0.15em;
      opacity: 0.85;
    }

    #status-bar {
      flex-shrink: 0;
      text-align: center;
      padding: 10px;
      font-size: 18px;
      font-weight: bold;
      min-height: 48px;
      transition: color 0.2s;
    }

    #status-bar.left  { color: #5599ff; }
    #status-bar.right { color: #ff5555; }
    #status-bar.error { color: #ffaa00; }
  </style>
</head>
<body>
  <div id="header">トロッコ コントローラー</div>

  <div id="buttons">
    <button class="btn" id="btn-left">
      <span class="btn-arrow">←</span>
      <span class="btn-label">LEFT</span>
    </button>
    <button class="btn" id="btn-right">
      <span class="btn-arrow">→</span>
      <span class="btn-label">RIGHT</span>
    </button>
  </div>

  <div id="status-bar">待機中</div>

  <script>
    const status = document.getElementById('status-bar');

    async function send(cmd) {
      const btnId = cmd === 'left' ? 'btn-left' : 'btn-right';
      const btn = document.getElementById(btnId);
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 150);

      status.className = cmd;
      status.textContent = cmd === 'left' ? '← 左を選択' : '右 → を選択';

      try {
        const res = await fetch('/api/ctrl/input', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cmd }),
        });
        if (!res.ok) throw new Error();
      } catch {
        status.className = 'error';
        status.textContent = '⚠ 送信エラー（ゲーム画面と同じWi-Fiか確認してください）';
      }
    }

    document.getElementById('btn-left').addEventListener('click',  () => send('left'));
    document.getElementById('btn-right').addEventListener('click', () => send('right'));
  </script>
</body>
</html>
