<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TROLLER CONTROLLER (Host)</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #111; color: #fff; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 300px; background: #222; padding: 20px; border-right: 1px solid #444; overflow-y: auto; }
        .main { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .card { background: #333; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #444; }
        h1 { color: #ffd700; font-size: 1.5rem; margin-top: 0; }
        button { 
            width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; 
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: #ffd700; color: #000; }
        .btn-primary:hover { background: #ffea00; }
        .btn-correct { background: #28a745; color: #fff; }
        .btn-incorrect { background: #dc3545; color: #fff; }
        .btn-secondary { background: #555; color: #fff; }
        
        .q-item { 
            padding: 10px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; 
            margin-bottom: 5px; background: #2a2a2a; font-size: 0.9rem;
        }
        .q-item.active { border-color: #ffd700; background: #444; }
        
        .preview-box { 
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; color: #666; font-size: 0.8rem;
            position: relative; overflow: hidden;
        }
        .status-badge { 
            display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;
            background: #444; margin-bottom: 15px;
        }
        .status-judging { background: #ff8c00; color: #fff; }
    </style>
</head>
<body>
    <div class="sidebar" id="question-list">
        <h1>QUESTIONS</h1>
        <!-- List will be populated here -->
    </div>
    <div class="main">
        <div class="status-badge" id="game-status">IDLE</div>
        
        <div class="preview-box" id="preview">
            [LIVE DISPLAY MIRROR]
        </div>

        <div class="card">
            <h1>CONTROL PANEL</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-primary" id="btn-next-q">次の問題へ (Q1)</button>
                <button class="btn-secondary" id="btn-start-timer">タイマー開始</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                <button class="btn-correct" id="btn-force-correct">強制正解</button>
                <button class="btn-incorrect" id="btn-force-incorrect">強制不正解</button>
            </div>
            <button class="btn-secondary" id="btn-reset" style="margin-top: 20px;">ゲームリセット</button>
        </div>
    </div>

    <script type="module">
        import { SyncManager } from './src/modules/SyncManager.js';
        
        const sync = new SyncManager(true);
        const qList = document.getElementById('question-list');
        const btnNextQ = document.getElementById('btn-next-q');
        const btnStartTimer = document.getElementById('btn-start-timer');
        const btnCorrect = document.getElementById('btn-force-correct');
        const btnIncorrect = document.getElementById('btn-force-incorrect');
        const btnReset = document.getElementById('btn-reset');
        const statusBadge = document.getElementById('game-status');

        let questions = [];
        let currentIndex = -1;

        async function init() {
            const resp = await fetch('/assets/data/questions.json');
            questions = await resp.json();
            
            questions.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = 'q-item';
                div.innerText = `${i+1}. ${q.question}`;
                div.onclick = () => jumpTo(i);
                div.id = `q-${i}`;
                qList.appendChild(div);
            });
        }

        function jumpTo(index) {
            currentIndex = index;
            updateUI();
            sync.send('JUMP_TO', { index });
            statusBadge.innerText = `STAGE ${index+1} READY`;
        }

        btnNextQ.onclick = () => {
            currentIndex++;
            if (currentIndex >= questions.length) currentIndex = 0;
            jumpTo(currentIndex);
        };

        btnStartTimer.onclick = () => {
            sync.send('START_TIMER', {});
            statusBadge.innerText = "TIMER RUNNING";
        };

        btnCorrect.onclick = () => {
            sync.send('JUDGE', { result: 'correct' });
            statusBadge.innerText = "JUDGED: CORRECT";
        };

        btnIncorrect.onclick = () => {
            sync.send('JUDGE', { result: 'incorrect' });
            statusBadge.innerText = "JUDGED: INCORRECT";
        };

        btnReset.onclick = () => {
            currentIndex = -1;
            sync.send('RESET', {});
            statusBadge.innerText = "IDLE (RESET)";
        };

        function updateUI() {
            document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active'));
            if (currentIndex >= 0) {
                document.getElementById(`q-${currentIndex}`).classList.add('active');
                btnNextQ.innerText = `次の問題へ (Q${currentIndex + 2})`;
            }
        }

        init();
    </script>
</body>
</html>
